<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cửa Hàng Hoa Quả Sạch</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; }
        body { background: #f4f7f6; color: #333; padding: 20px; }
        header { text-align: center; padding: 20px; background: #2ecc71; color: white; border-radius: 8px; margin-bottom: 20px; }
        
        /* Thanh tìm kiếm */
        .search-container { text-align: center; margin-bottom: 20px; }
        .search-container input { width: 60%; padding: 12px; border: 2px solid #2ecc71; border-radius: 25px; outline: none; font-size: 16px; }

        /* Lưới sản phẩm */
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; }
        .product-card { background: white; border-radius: 8px; padding: 15px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: 0.3s; }
        .product-card:hover { transform: translateY(-5px); }
        .product-card img { width: 100%; height: 200px; object-fit: cover; border-radius: 6px; }
        .product-card h3 { margin: 15px 0 10px; color: #2c3e50; }
        .product-card p { color: #e74c3c; font-weight: bold; margin-bottom: 15px; }
        .btn-buy { background: #2ecc71; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; text-decoration: none; display: inline-block; }
        .btn-buy:hover { background: #27ae60; }

        /* Phân trang */
        .pagination { display: flex; justify-content: center; margin: 30px 0; gap: 10px; }
        .pagination button { padding: 10px 15px; border: 1px solid #2ecc71; background: white; color: #2ecc71; cursor: pointer; border-radius: 5px; font-weight: bold; }
        .pagination button.active { background: #2ecc71; color: white; }
        .pagination button:disabled { background: #cccccc; border-color: #cccccc; cursor: not-allowed; color: #666; }

        /* Popup Thanh Toán */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 25px; border-radius: 10px; text-align: center; max-width: 450px; width: 90%; position: relative; }
        .modal-content h2 { margin-bottom: 15px; color: #2c3e50; }
        .modal-content img { width: 250px; height: 250px; margin: 15px 0; border: 1px solid #ddd; }
        .btn-submit-form { display: block; background: #e67e22; color: white; padding: 12px; text-decoration: none; border-radius: 5px; font-weight: bold; margin-top: 15px; }
        .btn-submit-form:hover { background: #d35400; }
        .close-btn { position: absolute; top: 10px; right: 15px; font-size: 24px; cursor: pointer; color: #aaa; }
    </style>
</head>
<body>

<header>
    <h1>Như Trang Shop</h1>
</header>

<div class="search-container">
    <input type="text" id="searchInput" placeholder="Nhập tên loại quả cần tìm..." oninput="handleSearch()">
</div>

<div class="product-grid" id="productGrid">
    </div>

<div class="pagination" id="pagination">
    </div>

<div class="modal" id="orderModal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <h2>Thanh Toán & Đặt Hàng</h2>
        <p>Bước 1: Quét mã QR dưới đây để thanh toán chuyển khoản</p>
        
        <img src="qr code.jpg" alt="Mã QR Thanh Toán">
        
        <p>Bước 2: Sau khi quét xong, bấm nút bên dưới để điền thông tin giao nhận hàng</p>
        
        <a href="https://forms.gle/uKnaNBn56kBixHFF9" target="_blank" class="btn-submit-form" onclick="closeModal()">Xác Nhận Đã Chuyển & Điền Form Nhận Hàng</a>
    </div>
</div>

<script>
    // Dữ liệu mẫu 18 loại quả (Có hình minh họa lấy từ Unsplash công khai)
    const products = [
        { id: 1, name: "Táo Đỏ Mỹ", price: "80.000đ / kg", img: "https://images.unsplash.com/photo-1560806887-1e4cd0b6cbd6?w=400" },
        { id: 2, name: "Chuối Tiêu", price: "25.000đ / nải", img: "https://images.unsplash.com/photo-1571771894821-ce9b6c11b08e?w=400" },
        { id: 3, name: "Cam Sành", price: "45.000đ / kg", img: "https://images.unsplash.com/photo-1547514701-42782101795e?w=400" },
        { id: 4, name: "Dâu Tây Đà Lạt", price: "150.000đ / hộp", img: "https://images.unsplash.com/photo-1464965911861-746a04b4bca6?w=400" },
        { id: 5, name: "Xoài Cát Chu", price: "60.000đ / kg", img: "https://images.unsplash.com/photo-1553279768-865429fa0078?w=400" },
        { id: 6, name: "Dưa Hấu Không Hạt", price: "18.000đ / kg", img: "https://images.unsplash.com/photo-1587049352846-4a222e784d38?w=400" },
        { id: 7, name: "Nho Ngón Tay", price: "220.000đ / kg", img: "https://images.unsplash.com/photo-1537640538966-79f369143f8f?w=400" },
        { id: 8, name: "Bơ Sáp Đắk Lắk", price: "40.000đ / kg", img: "https://images.unsplash.com/photo-1523049673857-eb18f1d7b578?w=400" },
        { id: 9, name: "Bưởi Da Xanh", price: "75.000đ / quả", img: "https://images.unsplash.com/photo-1582284540020-8acae03f417a?w=400" },
        { id: 10, name: "Kiwi Vàng", price: "130.000đ / kg", img: "https://images.unsplash.com/photo-1585059895524-72359e06133a?w=400" },
        { id: 11, name: "Việt Quất", price: "95.000đ / hộp", img: "https://images.unsplash.com/photo-1601004890684-d8cbf643f5f2?w=400" },
        { id: 12, name: "Sầu Riêng Ri6", price: "120.000đ / kg", img: "https://images.unsplash.com/photo-1629115911501-c035ca2e7d70?w=400" },
        { id: 13, name: "Chanh Dây", price: "30.000đ / kg", img: "https://images.unsplash.com/photo-1579547621113-e4bb2a19bdd6?w=400" },
        { id: 14, name: "Măng Cụt", price: "85.000đ / kg", img: "https://images.unsplash.com/photo-1596547609652-9cf5d8d76921?w=400" },
        { id: 15, name: "Vải Thiều", price: "45.000đ / kg", img: "https://images.unsplash.com/photo-1627931652136-de64dfdf7bfb?w=400" },
        { id: 16, name: "Chôm Chôm Nhãn", price: "40.000đ / kg", img: "https://images.unsplash.com/photo-1562447472-974cfd9952f5?w=400" },
        { id: 17, name: "Đu Đủ Ruột Đỏ", price: "25.000đ / kg", img: "https://images.unsplash.com/photo-1528826722302-d6ff428d6cf3?w=400" },
        { id: 18, name: "Thanh Long Đỏ", price: "35.000đ / kg", img: "https://images.unsplash.com/photo-1550258987-190a2d41a8ba?w=400" }
    ];

    let filteredProducts = [...products]; 
    const itemsPerPage = 9;
    let currentPage = 1;

    // Hàm hiển thị sản phẩm lên lưới
    function renderProducts() {
        const grid = document.getElementById("productGrid");
        grid.innerHTML = "";

        if (filteredProducts.length === 0) {
            grid.innerHTML = `<p style="grid-column: 1/-1; text-align:center; font-size:18px; color:#888;">Không tìm thấy loại quả nào phù hợp!</p>`;
            return;
        }

        // Tính toán vị trí cắt mảng theo trang
        const start = (currentPage - 1) * itemsPerPage;
        const end = start + itemsPerPage;
        const pageItems = filteredProducts.slice(start, end);

        pageItems.forEach(item => {
            const card = document.createElement("div");
            card.className = "product-card";
            card.innerHTML = `
                <img src="${item.img}" alt="${item.name}">
                <h3>${item.name}</h3>
                <p>${item.price}</p>
                <button class="btn-buy" onclick="openModal()">Đặt Mua Ngay</button>
            `;
            grid.appendChild(card);
        });
    }

    // Hàm sinh nút phân trang
    function renderPagination() {
        const paginationContainer = document.getElementById("pagination");
        paginationContainer.innerHTML = "";

        const totalPages = Math.ceil(filteredProducts.length / itemsPerPage);
        if (totalPages <= 1) return; // Nếu chỉ có 1 trang thì ẩn phân trang

        // Nút Prev
        const prevBtn = document.createElement("button");
        prevBtn.innerText = "Trước";
        prevBtn.disabled = currentPage === 1;
        prevBtn.onclick = () => { currentPage--; updateUI(); };
        paginationContainer.appendChild(prevBtn);

        // Các nút số trang
        for (let i = 1; i <= totalPages; i++) {
            const pageBtn = document.createElement("button");
            pageBtn.innerText = i;
            if (i === currentPage) pageBtn.className = "active";
            pageBtn.onclick = () => { currentPage = i; updateUI(); };
            paginationContainer.appendChild(pageBtn);
        }

        // Nút Next
        const nextBtn = document.createElement("button");
        nextBtn.innerText = "Sau";
        nextBtn.disabled = currentPage === totalPages;
        nextBtn.onclick = () => { currentPage++; updateUI(); };
        paginationContainer.appendChild(nextBtn);
    }

    function updateUI() {
        renderProducts();
        renderPagination();
    }

    // Hàm Tìm Kiếm
    function handleSearch() {
        const keyword = document.getElementById("searchInput").value.toLowerCase().trim();
        // Lọc danh sách dựa trên từ khóa tiếng Việt không dấu/có dấu cơ bản
        filteredProducts = products.filter(p => p.name.toLowerCase().includes(keyword));
        currentPage = 1; // Reset về trang 1 khi tìm kiếm
        updateUI();
    }

    // Quản lý Đóng/Mở Popup đặt hàng
    function openModal() { document.getElementById("orderModal").style.display = "flex"; }
    function closeModal() { document.getElementById("orderModal").style.display = "none"; }

    // Đóng popup khi click ra ngoài vùng trắng
    window.onclick = function(event) {
        const modal = document.getElementById("orderModal");
        if (event.target === modal) closeModal();
    }

    // Khởi chạy ứng dụng lần đầu
    updateUI();
</script>
</body>
</html>
